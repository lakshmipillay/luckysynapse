theme = "congo"
baseURL = "https://luckysynapse.lpillay.workers.dev/"
defaultContentLanguage = "en"
enableRobotsTXT = true
summaryLength = 30
enableEmoji = true

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[imaging]
  anchor = 'Center'

[params]
  colorScheme = "sapphire"
  defaultAppearance = "dark"
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = true
  mainSections = ["tech", "personal"]
  favicon = ""
  comments = true
  foraSiteKey = "site_91fdc0fc8375498781dd"

[params.header]
  layout = "fixed"

[params.footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[params.homepage]
  layout = "profile"
  showRecent = true
  showRecentItems = 6
  cardView = true

[params.article]
  showDate = true
  showAuthor = false
  showHero = true
  heroStyle = "thumbAndBackground"
  showBreadcrumbs = true
  showReadingTime = true
  showTableOfContents = true
  showRelatedContent = true
  showWordCount = true
  showHeadingAnchors = true
  showPagination = true

[params.list]
  showHero = true
  heroStyle = "background"
  showSummary = true
  showCards = true

[params.term]
  showHero = true
  showCards = true

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
  [markup.goldmark.renderer]
    unsafe = true

[languages.en]
  title = "Lucky Synapse"
  languageName = "English"
  weight = 1

  [languages.en.params]
    description = "Clean architecture. Real AI. No hype."

  [languages.en.params.author]
    name = "Lucky"
    headline = "Clean architecture. Real AI. No hype."
    bio = "Backend architect. Building things that actually work."
    links = [
      { github = "https://github.com/" },
    ]

[[languages.en.menu.main]]
  name = "Tech"
  pageRef = "tech"
  weight = 1

[[languages.en.menu.main]]
  name = "Personal"
  pageRef = "personal"
  weight = 2

[[languages.en.menu.main]]
  name = "Tags"
  pageRef = "tags"
  weight = 3
